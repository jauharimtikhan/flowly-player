name: Build and Upload EXE

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-tag:
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from commit message
        id: tag
        run: |
          MSG=$(git log -1 --pretty=%B)
          TAG=$(echo "$MSG" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')

          echo "Found tag: $TAG"

          if [ ! -z "$TAG" ]; then
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Create Tag
        if: steps.tag.outputs.tag != ''
        run: |
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

  build:
    needs: create-tag
    if: startsWith(github.ref, 'refs/tags/v') || needs.create-tag.outputs.tag != ''
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }} >> .env
          echo YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }} >> .env

      - name: Build
        run: npm run build:win

      - name: Upload EXE files to server
        shell: powershell
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          PASS: ${{ secrets.SERVER_PASSWORD }}
        run: |

          Write-Host "Searching EXE files..."

          $files = Get-ChildItem -Path dist -Recurse -Filter *.exe

          foreach ($file in $files) {

            $filename = $file.Name
            Write-Host "Checking $filename on server..."

            ssh $env:USER@$env:HOST "test -f /home/jtech/clusters/jauhar/flowlyplayer/public_html/files/$filename"

            if ($LASTEXITCODE -eq 0) {
                Write-Host "$filename already exists. Skipping upload."
            }
            else {
                Write-Host "Uploading $filename..."
                scp $file.FullName "$env:USER@$env:HOST:/home/jtech/clusters/jauhar/flowlyplayer/public_html/files/"
            }

          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
