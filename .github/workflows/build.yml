name: Build and Upload EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit message
        id: commit
        shell: bash
        run: |
          echo "message=${{ github.event.head_commit.message }}" >> $GITHUB_OUTPUT

      - name: Extract version
        id: version
        shell: bash
        run: |
          MSG="${{ steps.commit.outputs.message }}"
          VERSION=$(echo "$MSG" | grep -oE "v[0-9]+\.[0-9]+\.[0-9]+")

          if [ -n "$VERSION" ]; then
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create Git Tag
        if: steps.version.outputs.version != ''
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          TAG=${{ steps.version.outputs.version }}

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists"
          else
            git tag $TAG
            git push origin $TAG
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build:win

      - name: Upload EXE files
        shell: bash
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          PASS: ${{ secrets.SERVER_PASSWORD }}
        run: |

          echo "Searching for EXE files..."

          for file in $(find dist -name "*.exe"); do

            filename=$(basename "$file")

            echo "Checking $filename on server..."

            sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$HOST \
            "test -f /home/jtech/clusters/jauhar/flowlyplayer/public_html/$filename"

            if [ $? -eq 0 ]; then
              echo "$filename already exists. Skipping upload."
            else
              echo "Uploading $filename..."
              sshpass -p "$PASS" scp -o StrictHostKeyChecking=no "$file" \
              $USER@$HOST:/home/jtech/clusters/jauhar/flowlyplayer/public_html/
            fi

          done
